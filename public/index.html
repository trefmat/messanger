<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat • E2EE</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode.js/1.5.3/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        .chat-bg { background-image: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), url('https://picsum.photos/id/1015/1920/1080'); background-size: cover; background-position: center; }
        .message-bubble { max-width: 70%; padding: 14px 18px; border-radius: 22px; position: relative; }
        .message-bubble.me { background: #10b981; color: white; border-bottom-right-radius: 4px; }
        .message-bubble.them { background: #27272a; border-bottom-left-radius: 4px; }
        .scrollbar-thin::-webkit-scrollbar { width: 4px; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 20px; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 h-screen overflow-hidden">

    <!-- ЛОГИН -->
    <div id="login-screen" class="flex items-center justify-center h-full">
        <div class="w-full max-w-xs p-6">
            <input id="username" type="text" placeholder="Логин" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl py-4 px-6 mb-4 outline-none focus:border-emerald-500">
            <input id="password" type="password" placeholder="Пароль" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl py-4 px-6 mb-6 outline-none focus:border-emerald-500">
            <button onclick="login()" class="w-full bg-emerald-500 hover:bg-emerald-600 py-4 rounded-2xl font-semibold text-lg transition">Войти</button>
        </div>
    </div>

    <!-- ЧАТ -->
    <div id="chat-screen" class="hidden h-full flex flex-col md:flex-row">
        <!-- SIDEBAR -->
        <div class="w-full md:w-80 bg-zinc-900 border-r border-zinc-800 flex flex-col">
            <div class="p-5 border-b border-zinc-800 flex items-center gap-3">
                <div class="flex-1">
                    <div id="my-name" class="font-semibold"></div>
                </div>
                <button id="admin-btn" onclick="showUsersModal()" class="text-zinc-400 hover:text-blue-400 hidden" title="Управление пользователями"><i class="fa-solid fa-users"></i></button>
                <button onclick="showChangePasswordModal()" class="text-zinc-400 hover:text-emerald-400" title="Смена пароля"><i class="fa-solid fa-lock"></i></button>
                <button onclick="logout()" class="text-zinc-400 hover:text-red-400"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>

            <div class="p-4">
                <div class="relative">
                    <input id="search" type="text" placeholder="Поиск контактов..." class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl py-3 px-5 pl-12 outline-none">
                    <i class="fa-solid fa-magnifying-glass absolute left-5 top-3.5 text-zinc-500"></i>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto scrollbar-thin" id="chats-list"></div>

            <div class="p-4 border-t border-zinc-800">
                <button onclick="newChatPrompt()" class="w-full bg-zinc-800 hover:bg-zinc-700 py-3 rounded-2xl flex items-center justify-center gap-2 text-emerald-400">
                    <i class="fa-solid fa-plus"></i> Новый чат
                </button>
            </div>
        </div>

        <!-- MAIN -->
        <div class="flex-1 flex flex-col">
            <div class="h-16 bg-zinc-900 border-b border-zinc-800 px-6 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <button onclick="toggleMobileSidebar()" class="md:hidden text-3xl text-zinc-400">☰</button>
                    <div id="chat-header-avatar" class="w-10 h-10 rounded-2xl overflow-hidden ring-2 ring-emerald-500/30 bg-gradient-to-br from-emerald-500 to-emerald-700 flex items-center justify-center text-white font-semibold"></div>
                    <div>
                        <div id="chat-header-name" class="font-semibold text-lg">Выберите чат</div>
                    </div>
                </div>
                <div class="flex gap-6">
                    <button onclick="showKeyModal()" class="text-zinc-400 hover:text-white"><i class="fa-solid fa-key"></i></button>
                </div>
            </div>

            <div id="messages" class="flex-1 overflow-y-auto p-6 chat-bg scrollbar-thin space-y-6"></div>

            <div class="bg-zinc-900 border-t border-zinc-800 p-5">
                <div class="max-w-3xl mx-auto flex gap-3">
                    <input id="message-input" onkeydown="if(event.key==='Enter') sendMessage()" placeholder="Напишите сообщение..." class="flex-1 bg-zinc-800 border border-zinc-700 focus:border-emerald-500 rounded-3xl py-4 px-6 outline-none">
                    <button onclick="sendMessage()" class="bg-emerald-500 hover:bg-emerald-600 w-14 h-14 rounded-3xl flex items-center justify-center text-2xl transition shadow-xl"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
                <div class="text-center text-[10px] text-zinc-500 mt-4">AES-256 E2EE • сообщения хранятся зашифрованными</div>
            </div>
        </div>
    </div>

    <!-- MODAL KEY -->
    <div id="key-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
        <div class="bg-zinc-900 rounded-3xl p-8 max-w-sm w-full mx-4">
            <h3 class="text-2xl font-semibold mb-6 flex items-center gap-3"><i class="fa-solid fa-key text-emerald-400"></i> Секретный ключ чата</h3>
            
            <!-- QR Код -->
            <div id="qr-container" class="flex justify-center mb-6 bg-white p-4 rounded-2xl" style="display: none;">
                <div id="qrcode"></div>
            </div>
            
            <!-- Поле ввода ключа -->
            <input id="key-input" type="text" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl py-4 px-6 text-lg outline-none" placeholder="Введите общий ключ (мин. 8 символов)" oninput="generateQRCode(this.value)">
            
            <!-- Кнопки -->
            <div class="mt-8 flex gap-3">
                <button onclick="generateRandomKey()" class="flex-1 py-3 bg-blue-500 hover:bg-blue-600 rounded-2xl font-medium text-sm flex items-center justify-center gap-2">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> Сгенерировать
                </button>
            </div>
            
            <div class="mt-4 flex gap-3">
                <button onclick="closeKeyModal()" class="flex-1 py-4 border border-zinc-700 rounded-2xl hover:bg-zinc-800">Отмена</button>
                <button onclick="saveKey()" class="flex-1 py-4 bg-emerald-500 hover:bg-emerald-600 rounded-2xl font-medium">Сохранить</button>
            </div>
        </div>
    </div>

    <!-- MODAL CHANGE PASSWORD -->
    <div id="change-password-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
        <div class="bg-zinc-900 rounded-3xl p-8 max-w-sm w-full mx-4">
            <h3 class="text-2xl font-semibold mb-6 flex items-center gap-3"><i class="fa-solid fa-lock text-emerald-400"></i> Смена пароля</h3>
            <input id="old-password" type="password" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl py-4 px-6 text-lg outline-none mb-4" placeholder="Старый пароль">
            <input id="new-password" type="password" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl py-4 px-6 text-lg outline-none mb-4" placeholder="Новый пароль">
            <input id="new-password-confirm" type="password" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl py-4 px-6 text-lg outline-none mb-8" placeholder="Подтверждение пароля">
            <div class="flex gap-3">
                <button onclick="closeChangePasswordModal()" class="flex-1 py-4 border border-zinc-700 rounded-2xl hover:bg-zinc-800">Отмена</button>
                <button onclick="submitChangePassword()" class="flex-1 py-4 bg-emerald-500 hover:bg-emerald-600 rounded-2xl font-medium">Изменить</button>
            </div>
        </div>
    </div>

    <!-- MODAL USERS MANAGEMENT -->
    <div id="users-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
        <div class="bg-zinc-900 rounded-3xl p-8 max-w-2xl w-full mx-4 max-h-[80vh] overflow-y-auto">
            <h3 class="text-2xl font-semibold mb-6 flex items-center gap-3"><i class="fa-solid fa-users text-blue-400"></i> Управление пользователями</h3>
            <div id="users-list" class="space-y-3 mb-8"></div>
            <div class="flex gap-3">
                <button onclick="showCreateUserModal()" class="flex-1 py-4 bg-blue-500 hover:bg-blue-600 rounded-2xl font-medium"><i class="fa-solid fa-plus"></i> Новый пользователь</button>
                <button onclick="closeUsersModal()" class="flex-1 py-4 border border-zinc-700 rounded-2xl hover:bg-zinc-800">Закрыть</button>
            </div>
        </div>
    </div>

    <!-- MODAL CREATE USER -->
    <div id="create-user-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
        <div class="bg-zinc-900 rounded-3xl p-8 max-w-sm w-full mx-4">
            <h3 class="text-2xl font-semibold mb-6 flex items-center gap-3"><i class="fa-solid fa-user-plus text-blue-400"></i> Создать пользователя</h3>
            <input id="new-user-login" type="text" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl py-4 px-6 text-lg outline-none mb-4" placeholder="Логин">
            <input id="new-user-password" type="password" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl py-4 px-6 text-lg outline-none mb-8" placeholder="Пароль">
            <div class="flex gap-3">
                <button onclick="closeCreateUserModal()" class="flex-1 py-4 border border-zinc-700 rounded-2xl hover:bg-zinc-800">Отмена</button>
                <button onclick="submitCreateUser()" class="flex-1 py-4 bg-blue-500 hover:bg-blue-600 rounded-2xl font-medium">Создать</button>
            </div>
        </div>
    </div>

    <script>
        let socket = null;
        let currentUser = null;
        let currentChatId = null;
        let currentChatPartner = null;
        let chatKeys = {}; // Будет заполнено при загрузке

        // 🔐 Функции для безопасного хранения ключей
        function encryptChatKeys(keys, token) {
            return CryptoJS.AES.encrypt(JSON.stringify(keys), token).toString();
        }

        function decryptChatKeys(encrypted, token) {
            try {
                const bytes = CryptoJS.AES.decrypt(encrypted, token);
                return JSON.parse(bytes.toString(CryptoJS.enc.Utf8));
            } catch (e) {
                console.warn('Ошибка при расшифровке ключей:', e);
                return {};
            }
        }

        function saveChatKeys(keys) {
            if (!currentUser || !currentUser.token) return;
            const encrypted = encryptChatKeys(keys, currentUser.token);
            localStorage.setItem('encryptedChatKeys', encrypted);
        }

        function loadChatKeys() {
            if (!currentUser || !currentUser.token) return {};
            const encrypted = localStorage.getItem('encryptedChatKeys');
            if (!encrypted) return {};
            return decryptChatKeys(encrypted, currentUser.token);
        }

        function getInitialAvatar(username) {
            return username.charAt(0).toUpperCase();
        }

        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            if (!username || !password) return alert('Введите логин и пароль');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.error) return alert(data.error);

                currentUser = data;
                localStorage.setItem('token', data.token);
                
                // Загружаем расшифрованные ключи
                chatKeys = loadChatKeys();

                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('chat-screen').classList.remove('hidden');

                document.getElementById('my-name').textContent = currentUser.username;

                // Показываем кнопку управления пользователями только для админа
                if (currentUser.username === 'admin') {
                    document.getElementById('admin-btn').classList.remove('hidden');
                }

                initSocket();
            } catch (e) {
                alert('Ошибка подключения');
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('encryptedChatKeys'); // 🔐 Очищаем зашифрованные ключи
            location.reload();
        }

        function initSocket() {
            // 🔐 Используем текущий домен вместо хардкода
            socket = io(window.location.origin, { auth: { token: currentUser.token } });

            socket.on('connect', () => socket.emit('get-chats'));

            socket.on('your-chats', renderChatsList);

            socket.on('chat-history', messages => renderMessages(messages, false));

            socket.on('new-message', msg => {
                // Если это не текущий открытый чат — игнорируем
                if (msg.chatId !== currentChatId) return;

                renderMessages([msg], true);
            });

            socket.on('chat-deleted', (deletedChatId) => {
                if (deletedChatId === currentChatId) {
                    currentChatId = null;
                    currentChatPartner = null;
                    document.getElementById('messages').innerHTML = '';
                    document.getElementById('chat-header-name').textContent = 'Выберите чат';
                }
                socket.emit('get-chats');
            });

            socket.on('error', (message) => {
                alert('Ошибка: ' + message);
            });
        }

        function renderChatsList(usernames) {
            const container = document.getElementById('chats-list');
            container.innerHTML = '';

            usernames.forEach(username => {
                if (username === currentUser.username) return;
                const chatId = [currentUser.username, username].sort().join('-');

                const el = document.createElement('div');
                el.className = `px-5 py-4 hover:bg-zinc-800 flex gap-4 items-center border-b border-zinc-800 group ${currentChatId === chatId ? 'bg-zinc-800' : ''}`;
                el.innerHTML = `
                    <div class="flex-1 cursor-pointer">
                        <div class="font-medium">${username}</div>
                    </div>
                    <button class="delete-chat-btn text-zinc-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition" title="Удалить чат"><i class="fa-solid fa-trash"></i></button>
                `;
                
                // Обработчик для удаления чата
                const deleteBtn = el.querySelector('.delete-chat-btn');
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteChat(chatId, username);
                });
                
                el.addEventListener('click', () => openChat(username, chatId));
                container.appendChild(el);
            });
        }

        function openChat(partner, chatId) {
            if (!partner || partner.trim() === '') {
                alert('Невалидное имя пользователя');
                return;
            }
            currentChatId = chatId;
            currentChatPartner = partner;

            document.getElementById('chat-header-avatar').innerHTML = `<div class="w-full h-full bg-gradient-to-br from-emerald-500 to-emerald-700 flex items-center justify-center text-white text-lg font-semibold">${partner.charAt(0).toUpperCase()}</div>`;
            document.getElementById('chat-header-name').textContent = partner;

            socket.emit('join-chat', partner);
            setTimeout(() => socket.emit('join-chat', partner), 200);
        }

        function newChatPrompt() {
            const username = prompt('Логин собеседника:');
            if (!username || username === currentUser.username) return;
            const chatId = [currentUser.username, username].sort().join('-');
            openChat(username, chatId);
        }

        function renderMessages(messages, append = false) {
            const container = document.getElementById('messages');
            if (!append) container.innerHTML = '';

            const key = chatKeys[currentChatId] || 'defaultkey';

            messages.forEach(msg => {
                const isMe = msg.from === currentUser.username;
                const text = decrypt(msg.cipher, key) || '[Ошибка расшифровки]';

                const div = document.createElement('div');
                div.className = `flex ${isMe ? 'justify-end' : 'justify-start'}`;
                
                const messageBubble = document.createElement('div');
                messageBubble.className = `message-bubble ${isMe ? 'me' : 'them'}`;
                
                const textDiv = document.createElement('div');
                textDiv.className = 'text-[15px] break-words';
                textDiv.textContent = text; // 🔐 Используем textContent вместо innerHTML для защиты от XSS
                
                const timeDiv = document.createElement('div');
                timeDiv.className = 'text-[10px] opacity-70 text-right mt-1';
                timeDiv.textContent = msg.time;
                
                messageBubble.appendChild(textDiv);
                messageBubble.appendChild(timeDiv);
                div.appendChild(messageBubble);
                container.appendChild(div);
            });

            container.scrollTop = container.scrollHeight;
        }

        function encrypt(text, key) {
            return CryptoJS.AES.encrypt(text, key).toString();
        }

        function decrypt(cipher, key) {
            try {
                const bytes = CryptoJS.AES.decrypt(cipher, key);
                return bytes.toString(CryptoJS.enc.Utf8) || '[Ошибка]';
            } catch {
                return '[Ошибка расшифровки]';
            }
        }

        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text || !currentChatId || !currentChatPartner) return;

            const key = chatKeys[currentChatId];
            if (!key) return alert('Задайте ключ чата (иконка замка)');

            const cipher = encrypt(text, key);
            const time = new Date().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});

            socket.emit('send-message', { otherUsername: currentChatPartner, cipher, time });

            input.value = '';
        }

        function showKeyModal() {
            if (!currentChatId) return alert('Выберите чат');
            const inputEl = document.getElementById('key-input');
            inputEl.value = chatKeys[currentChatId] || '';
            document.getElementById('key-modal').classList.remove('hidden');
            generateQRCode(inputEl.value);
        }

        function closeKeyModal() { 
            document.getElementById('key-modal').classList.add('hidden');
            document.getElementById('qr-container').style.display = 'none';
            document.getElementById('qrcode').innerHTML = '';
        }

        function generateRandomKey() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*';
            let key = '';
            for (let i = 0; i < 32; i++) {
                key += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            const inputEl = document.getElementById('key-input');
            inputEl.value = key;
            generateQRCode(key);
        }

        function generateQRCode(text) {
            if (!text || text.length < 8) {
                document.getElementById('qr-container').style.display = 'none';
                document.getElementById('qrcode').innerHTML = '';
                return;
            }
            
            document.getElementById('qr-container').style.display = 'flex';
            document.getElementById('qrcode').innerHTML = '';
            
            new QRCode(document.getElementById('qrcode'), {
                text: text,
                width: 200,
                height: 200,
                colorDark: '#000000',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        function showChangePasswordModal() {
            document.getElementById('change-password-modal').classList.remove('hidden');
            document.getElementById('old-password').value = '';
            document.getElementById('new-password').value = '';
            document.getElementById('new-password-confirm').value = '';
            document.getElementById('old-password').focus();
        }

        function closeChangePasswordModal() {
            document.getElementById('change-password-modal').classList.add('hidden');
        }

        function saveKey() {
            const newKey = document.getElementById('key-input').value.trim();
            if (newKey.length < 8) return alert('Минимум 8 символов');
            chatKeys[currentChatId] = newKey;
            saveChatKeys(chatKeys); // 🔐 Сохраняем в зашифрованном виде
            closeKeyModal();
            alert('Ключ сохранён (зашифрован и защищен)');
            socket.emit('join-chat', currentChatPartner);
        }

        function deleteChat(chatId, username) {
            if (!confirm(`Удалить чат с ${username}? Сообщения будут удалены.`)) return;
            
            // 🔐 Отправляем username вместо chatId для безопасности
            socket.emit('delete-chat', username);
            
            // Удаляем из UI
            currentChatId = null;
            currentChatPartner = null;
            document.getElementById('messages').innerHTML = '';
            document.getElementById('chat-header-name').textContent = 'Выберите чат';
            
            // Обновляем список чатов
            socket.emit('get-chats');
        }

        async function submitChangePassword() {
            const oldPassword = document.getElementById('old-password').value.trim();
            const newPassword = document.getElementById('new-password').value.trim();
            const confirmPassword = document.getElementById('new-password-confirm').value.trim();

            if (!oldPassword || !newPassword) return alert('Заполните все поля');
            if (newPassword !== confirmPassword) return alert('Пароли не совпадают');
            
            // 🔐 Проверка требований пароля на фронтенде
            if (newPassword.length < 12) return alert('Пароль должен быть минимум 12 символов');
            if (!/[A-Z]/.test(newPassword)) return alert('Пароль должен содержать заглавные буквы');
            if (!/[a-z]/.test(newPassword)) return alert('Пароль должен содержать строчные буквы');
            if (!/\d/.test(newPassword)) return alert('Пароль должен содержать цифры');

            try {
                const token = localStorage.getItem('token');
                const res = await fetch('/api/change-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ oldPassword, newPassword })
                });
                const data = await res.json();
                if (data.error) return alert(data.error);

                alert('Пароль успешно изменён');
                closeChangePasswordModal();
            } catch (e) {
                alert('Ошибка при смене пароля');
            }
        }

        function toggleMobileSidebar() {}

        async function showUsersModal() {
            document.getElementById('users-modal').classList.remove('hidden');
            
            try {
                const token = localStorage.getItem('token');
                const res = await fetch('/api/users', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const users = await res.json();
                
                const container = document.getElementById('users-list');
                container.innerHTML = '';
                
                users.forEach(user => {
                    const div = document.createElement('div');
                    div.className = 'bg-zinc-800 p-4 rounded-2xl flex items-center justify-between';
                    div.innerHTML = `
                        <div class="flex items-center gap-4">
                            <span class="font-medium">${user.username}</span>
                        </div>
                        <button onclick="showAdminPasswordModal('${user.username}')" class="bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded-lg text-sm font-medium">
                            Смена пароля
                        </button>
                    `;
                    container.appendChild(div);
                });
            } catch (e) {
                alert('Ошибка при загрузке списка пользователей');
            }
        }

        function closeUsersModal() {
            document.getElementById('users-modal').classList.add('hidden');
        }

        function showCreateUserModal() {
            document.getElementById('create-user-modal').classList.remove('hidden');
            document.getElementById('new-user-login').value = '';
            document.getElementById('new-user-password').value = '';
            document.getElementById('new-user-login').focus();
        }

        function closeCreateUserModal() {
            document.getElementById('create-user-modal').classList.add('hidden');
        }

        async function submitCreateUser() {
            const username = document.getElementById('new-user-login').value.trim();
            const password = document.getElementById('new-user-password').value.trim();

            if (!username || !password) return alert('Заполните все поля');
            
            // 🔐 Валидация username
            const usernameRegex = /^[a-zA-Z0-9_]{3,20}$/;
            if (!usernameRegex.test(username)) {
                return alert('Логин: 3-20 символов (буквы, цифры, подчеркивание)');
            }
            
            // 🔐 Валидация пароля
            if (password.length < 12) return alert('Пароль должен быть минимум 12 символов');
            if (!/[A-Z]/.test(password)) return alert('Пароль должен содержать заглавные буквы');
            if (!/[a-z]/.test(password)) return alert('Пароль должен содержать строчные буквы');
            if (!/\d/.test(password)) return alert('Пароль должен содержать цифры');

            try {
                const res = await fetch('/api/create-user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.error) return alert(data.error);

                alert(`Пользователь ${username} успешно создан`);
                closeCreateUserModal();
                showUsersModal();
            } catch (e) {
                alert('Ошибка при создании пользователя');
            }
        }

        function showAdminPasswordModal(username) {
            const newPassword = prompt(`Введите новый пароль для ${username}:`);
            if (!newPassword) return;
            
            // 🔐 Валидация пароля
            if (newPassword.length < 12) return alert('Пароль должен быть минимум 12 символов');
            if (!/[A-Z]/.test(newPassword)) return alert('Пароль должен содержать заглавные буквы');
            if (!/[a-z]/.test(newPassword)) return alert('Пароль должен содержать строчные буквы');
            if (!/\d/.test(newPassword)) return alert('Пароль должен содержать цифры');
            
            changeUserPasswordAsAdmin(username, newPassword);
        }

        async function changeUserPasswordAsAdmin(username, newPassword) {
            try {
                const token = localStorage.getItem('token');
                const res = await fetch('/api/change-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ targetUsername: username, newPassword })
                });
                const data = await res.json();
                if (data.error) return alert(data.error);

                alert(`Пароль пользователя ${username} успешно изменён`);
                showUsersModal();
            } catch (e) {
                alert('Ошибка при смене пароля');
            }
        }

        function toggleMobileSidebar() {}


        window.onload = async () => {
            const token = localStorage.getItem('token');
            if (!token) return;

            try {
                const res = await fetch('/api/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error('Токен недействителен');
                const data = await res.json();
                currentUser = { ...data, token };

                // 🔐 Загружаем расшифрованные ключи
                chatKeys = loadChatKeys();

                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('chat-screen').classList.remove('hidden');

                document.getElementById('my-name').textContent = currentUser.username;

                // Показываем кнопку управления пользователями только для админа
                if (currentUser.username === 'admin') {
                    document.getElementById('admin-btn').classList.remove('hidden');
                }

                initSocket();
            } catch (e) {
                localStorage.removeItem('token');
                localStorage.removeItem('encryptedChatKeys'); // 🔐 Очищаем при ошибке
            }
        };
    </script>
</body>
